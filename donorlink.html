<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonorLink - Donation Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e9d5ff 0%, #ddd6fe 50%, #fae8ff 100%);
            color: #6b21a8;
            min-height: 100vh;
            padding: 2rem;
        }

        body.dark-mode {
            background: #0f0a1e;
            color: #ffffff;
        }

        body.dark-mode .navbar {
            background: #1a1432;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        body.dark-mode .stat-card,
        body.dark-mode .form-card,
        body.dark-mode .chart-card,
        body.dark-mode .list-card {
            background: rgba(26, 20, 50, 0.6);
            color: #ffffff;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        body.dark-mode input,
        body.dark-mode .donor-item {
            background: rgba(139, 92, 246, 0.05);
            color: #ffffff;
            border-color: rgba(139, 92, 246, 0.3);
        }

        body.dark-mode .stat-title,
        body.dark-mode label {
            color: #d1d5db;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #8b5cf6;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #8b5cf6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: rotate(180deg);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 0.5rem;
        }

        .stat-title {
            font-size: 1rem;
            color: #6b21a8;
            font-weight: 500;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-card, .chart-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #6b21a8;
            margin-bottom: 1.5rem;
        }

        body.dark-mode h2 {
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #6b21a8;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid #d8b4fe;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            color: #6b21a8;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .save-btn {
            padding: 1rem;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            padding: 1rem;
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border: 1px solid #d8b4fe;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .chart-container {
            height: 350px;
            margin-top: 1rem;
        }

        .list-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.1);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .control-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .control-btn {
            padding: 0.625rem 1rem;
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border: 1px solid #d8b4fe;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        .donor-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .donor-item {
            background: rgba(233, 213, 255, 0.3);
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(139, 92, 246, 0.2);
            animation: slideInRight 0.4s ease forwards;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .donor-item:hover {
            background: rgba(216, 180, 254, 0.3);
            border-color: rgba(139, 92, 246, 0.4);
            transform: translateX(5px);
        }

        .donor-info {
            flex: 1;
        }

        .donor-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: #6b21a8;
        }

        body.dark-mode .donor-name {
            color: #ffffff;
        }

        .donor-details {
            font-size: 0.9rem;
            color: #9333ea;
            opacity: 0.8;
        }

        body.dark-mode .donor-details {
            color: #d8b4fe;
        }

        .delete-btn {
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <div class="logo-icon">🎁</div>
            <span>DonorLink</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="container">
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalDonations">$0.00</div>
                <div class="stat-title">Total Donations</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="totalDonors">0</div>
                <div class="stat-title">Total Donors</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="avgDonation">$0.00</div>
                <div class="stat-title">Average Donation</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Form Card -->
            <div class="form-card">
                <h2>Add/Edit Donation</h2>
                <form id="donationForm">
                    <div class="form-group">
                        <label>Donor Name</label>
                        <input type="text" id="donorName" required placeholder="Enter donor name">
                    </div>
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="donationAmount" min="0" step="0.01" required placeholder="Enter amount">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="donationDate" required>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="save-btn">Save Donation</button>
                        <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
                    </div>
                </form>
            </div>

            <!-- Chart Card -->
            <div class="chart-card">
                <h2>Donation Chart</h2>
                <div class="chart-container">
                    <canvas id="donationChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Donations List -->
        <div class="list-card">
            <div class="list-header">
                <h2>Donations List</h2>
                <div class="control-buttons">
                    <button class="control-btn" onclick="sortByName()">Sort by Name</button>
                    <button class="control-btn" onclick="sortByAmount()">Sort by Amount</button>
                    <button class="control-btn" onclick="clearAll()">Clear All</button>
                </div>
            </div>
            <div class="donor-list" id="donorList"></div>
        </div>
    </div>

    <script>
        // Linked List Implementation
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
                this.size = 0;
            }

            add(data) {
                const newNode = new Node(data);
                if (!this.head) {
                    this.head = newNode;
                } else {
                    let current = this.head;
                    while (current.next) {
                        current = current.next;
                    }
                    current.next = newNode;
                }
                this.size++;
            }

            remove(donorId) {
                if (!this.head) return;

                if (this.head.data.id === donorId) {
                    this.head = this.head.next;
                    this.size--;
                    return;
                }

                let current = this.head;
                while (current.next) {
                    if (current.next.data.id === donorId) {
                        current.next = current.next.next;
                        this.size--;
                        return;
                    }
                    current = current.next;
                }
            }

            toArray() {
                const arr = [];
                let current = this.head;
                while (current) {
                    arr.push(current.data);
                    current = current.next;
                }
                return arr;
            }

            clear() {
                this.head = null;
                this.size = 0;
            }
        }

        const donorList = new LinkedList();
        let chart = null;

        // Set default date
        document.getElementById('donationDate').valueAsDate = new Date();

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            if (chart) {
                updateChart(donorList.toArray());
            }
        }

        // Form submission
        document.getElementById('donationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('donorName').value.trim();
            const amount = parseFloat(document.getElementById('donationAmount').value);
            const date = document.getElementById('donationDate').value;

            if (!name || !amount || !date) {
                alert('Please fill in all fields');
                return;
            }

            const donor = {
                name: name,
                amount: amount,
                date: date,
                id: Date.now()
            };

            donorList.add(donor);
            updateDisplay();
            clearForm();
            
            // Show success feedback
            const saveBtn = document.querySelector('.save-btn');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '✓ Saved!';
            saveBtn.style.background = '#10b981';
            setTimeout(() => {
                saveBtn.textContent = originalText;
                saveBtn.style.background = '#8b5cf6';
            }, 1500);
        });

        function clearForm() {
            document.getElementById('donationForm').reset();
            document.getElementById('donationDate').valueAsDate = new Date();
        }

        // Bubble Sort by Name
        function sortByName() {
            const arr = donorList.toArray();
            for (let i = 0; i < arr.length - 1; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) {
                    if (arr[j].name.toLowerCase() > arr[j + 1].name.toLowerCase()) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                }
            }
            rebuildList(arr);
        }

        // Bubble Sort by Amount
        function sortByAmount() {
            const arr = donorList.toArray();
            for (let i = 0; i < arr.length - 1; i++) {
                for (let j = 0; j < arr.length - i - 1; j++) {
                    if (arr[j].amount < arr[j + 1].amount) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                }
            }
            rebuildList(arr);
        }

        function rebuildList(arr) {
            donorList.clear();
            arr.forEach(donor => donorList.add(donor));
            updateDisplay();
        }

        function removeDonor(id) {
            if (confirm('Are you sure you want to delete this donation?')) {
                donorList.remove(id);
                updateDisplay();
            }
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all donations?')) {
                donorList.clear();
                updateDisplay();
            }
        }

        function updateDisplay() {
            const donors = donorList.toArray();
            
            // Update donor list
            const listEl = document.getElementById('donorList');
            listEl.innerHTML = donors.length > 0 ? donors.map(donor => `
                <div class="donor-item">
                    <div class="donor-info">
                        <div class="donor-name">${donor.name}</div>
                        <div class="donor-details">$${donor.amount.toFixed(2)} - ${donor.date}</div>
                    </div>
                    <button class="delete-btn" onclick="removeDonor(${donor.id})">Delete</button>
                </div>
            `).join('') : '<p style="text-align: center; color: #9333ea; padding: 2rem; opacity: 0.7;">No donations yet. Add your first donation!</p>';

            // Calculate stats
            const total = donors.reduce((sum, d) => sum + d.amount, 0);
            const avg = donors.length > 0 ? total / donors.length : 0;

            // Update stats
            document.getElementById('totalDonations').textContent = '$' + total.toFixed(2);
            document.getElementById('totalDonors').textContent = donors.length;
            document.getElementById('avgDonation').textContent = '$' + avg.toFixed(2);

            // Update chart
            updateChart(donors);
        }

        function updateChart(donors) {
            const ctx = document.getElementById('donationChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            const isDarkMode = document.body.classList.contains('dark-mode');
            const textColor = isDarkMode ? '#d1d5db' : '#6b21a8';
            const gridColor = isDarkMode ? 'rgba(139, 92, 246, 0.1)' : 'rgba(147, 51, 234, 0.1)';

            // Group donations by month
            const monthlyData = {};
            donors.forEach(d => {
                const month = d.date.substring(0, 7); // YYYY-MM
                monthlyData[month] = (monthlyData[month] || 0) + d.amount;
            });

            const labels = Object.keys(monthlyData).sort();
            const data = labels.map(label => monthlyData[label]);

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Donations ($)',
                        data: data,
                        backgroundColor: 'rgba(168, 85, 247, 0.7)',
                        borderColor: '#a855f7',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: textColor,
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: textColor },
                            grid: { color: gridColor }
                        },
                        x: {
                            ticks: { color: textColor },
                            grid: { color: gridColor }
                        }
                    }
                }
            });
        }

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
